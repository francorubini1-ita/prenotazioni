<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Prenotazione Espositori</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section id="prenotazione-espositore">
  <div id="app">
    <div class="app-header">Prenotazione espositori</div>

    <div class="card">
      <div class="field">
        <label class="field-label" for="espositore">Scegli l'espositore</label>
        <select class="field-input" id="espositore">
          <option value="A">Espositore A</option>
          <option value="B">Espositore B</option>
        </select>
      </div>

      <div class="field">
        <label class="field-label" for="date">Quando?</label>
        <input class="field-input" type="date" id="date">
      </div>

      <div class="field time-row">
        <div class="time-col">
          <label class="field-label" for="start">Dalle...</label>
          <input class="field-input" type="time" id="start">
        </div>
        <div class="time-col">
          <label class="field-label" for="end">Alle...</label>
          <input class="field-input" type="time" id="end">
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="chiPrenota">Chi Prenota:</label>
        <input class="field-input" type="text" id="chiPrenota" placeholder="Tuo nome e cognome">
      </div>

      <div class="field">
        <label class="field-label" for="compagno">Con:</label>
        <input class="field-input" type="text" id="compagno" placeholder="Nome del tuo compagno">
      </div>

      <div class="field">
        <label class="field-label" for="name">Tuo numero di telefono:</label>
        <input class="field-input" type="tel" id="phone" placeholder="Es.: 3331234567">
      </div>
      
      <div class="field">
        <label class="field-label" for="postazione">In quale postazione?</label>
        <select class="field-input" id="postazione">
          <option value="1">Postazione 1</option>
          <option value="2">Postazione 2</option>
          <option value="3">Postazione 3</option>
          <option value="4">Postazione 4</option>
          <option value="5">Postazione 5</option>
          <option value="6">Postazione 6</option>
          <option value="7">Postazione 7</option>
          <option value="8">Postazione 8</option>
        </select>
      </div>

      <button id="openPostazioni" class="postazioni-inline-btn">📍 Mappa delle postazioni</button>
    </div>

    <div id="formContainer">
      <div id="detailsPanel"></div>
      <button id="check">Controlla la disponibilità</button>
      <button id="send" disabled>Invia la prenotazione</button>
    </div>

    <h3 class="title" style="margin: 30px 15px 15px; font-size: 24px;">Riepilogo prenotazioni:</h3>
    <div class="update-wrap" style="text-align:right; padding-right:15px; margin-bottom: 10px;">
        <button class="secondary" style="width:auto; padding:8px 20px; font-size:18px;" onclick="caricaRiepilogo()">🔄 Aggiorna...</button>
    </div>
    <div id="riepilogo"></div>

    <div id="confirmModal" class="glass-overlay">
      <div id="confirmBox">
        <h3>Confermi questi dati?</h3>
        <p id="confirmText"></p>
        <div style="display:flex; gap:15px; margin-top:25px;">
          <button id="confirmYes" style="background:var(--success); color:white;">Confermo!</button>
          <button id="confirmNo" class="secondary">Annullo...</button>
        </div>
      </div>
    </div>

    <div id="loadingOverlay" class="glass-overlay">
        <div class="spinner"></div>
        <span>Salvataggio in corso...</span>
    </div>

    <div id="checkingOverlay" class="glass-overlay">
        <div class="spinner"></div>
        <span>Verifica in corso...</span>
    </div>

    <div id="postazioniMenu">
      <div id="postazioniHeader">
        <strong>Posizioni GPS</strong>
        <button id="closePostazioni" class="secondary" style="width:auto; padding:10px 15px;">Chiudi</button>
      </div>
      <div id="postazioniList"></div>
    </div>
  </div>
</section>

<script src="app.js"></script>
</body>
</html>
